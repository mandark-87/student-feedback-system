<!DOCTYPE html>
<html>
<head>
    <title>Feedback Analytics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="page">
    <div class="container">

        <h2>Feedback Analytics Dashboard</h2>

        <div class="form-card">
            <h3 style="text-align:center;">Overall Average Rating</h3>
            <p style="font-size:28px; text-align:center; color:#1e3c72;">
                ⭐ {{ overall_avg }}/5
            </p>
        </div>

        <h2 class="section-title">Faculty Performance</h2>

        <div class="table-card">
            <table>
                <tr>
                    <th>Faculty Name</th>
                    <th>Subject</th>
                    <th>Total Feedback</th>
                    <th>Average Rating</th>
                </tr>

                {% for f in faculty_stats %}
                <tr>
                    <td>{{ f[0] }}</td>
                    <td>{{ f[1] }}</td>
                    <td>{{ f[2] }}</td>
                    <td>{{ f[3] }}/5</td>
                </tr>
                {% endfor %}
            </table>
        </div>

    </div>
</div>
</body>
</html>
